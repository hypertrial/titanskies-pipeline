version: 2

models:
  - name: int_tempo_no2_std_region_hourly
    description: Area-weighted region-hour NO2 rollups (standard V04) with contract readiness.
    columns:
      - name: canonical_region_id
        tests: [not_null]
      - name: observation_hour
        tests: [not_null]
      - name: valid_area_km2
        tests: [not_null]
      - name: total_area_km2
        tests: [not_null]
      - name: is_analysis_ready
        tests: [not_null]

  - name: int_tempo_no2_std_region_anomalies
    description: Median/MAD anomaly metrics against prior observations at the same IANA local hour (standard V04).
    columns:
      - name: canonical_region_id
        tests: [not_null]
      - name: observation_hour
        tests: [not_null]
      - name: timezone
        tests: [not_null]
      - name: baseline_sample_count
        tests: [not_null]

unit_tests:
  - name: test_std_area_weighted_hourly_contract
    model: int_tempo_no2_std_region_hourly
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('tempo_no2_std_contract')
        rows:
          - {contract_key: default, contract_version: 0.4.0, min_region_coverage: 0.25, stale_hours_warn: 24, stale_hours_error: 48, anomaly_baseline_days: 28, anomaly_min_baseline_samples: 7, accepted_quality_flags: "0|1"}
      - input: ref('stg_tempo_no2_std_region_registry')
        rows:
          - {canonical_region_id: US-CA-037, timezone: America/Los_Angeles}
      - input: ref('stg_tempo_no2_std_region_hour_aggregates')
        rows:
          - {canonical_region_id: US-CA-037, country_code: US, region_type: county, observation_hour: "2026-07-12 20:00:00", no2_mean: 17.5, no2_median: 20.0, no2_p90: 20.0, valid_pixel_count: 2, total_pixel_count: 4, valid_area_km2: 4.0, total_area_km2: 10.0, coverage_fraction: 0.4, quality_flag_accepted: true, source_granule_count: 2, all_granules_validated: true, revision: 1, geometry_version: test-v1, ingested_at: "2026-07-12 20:06:00"}
    expect:
      rows:
        - {canonical_region_id: US-CA-037, no2_mean: 17.5, valid_area_km2: 4.0, total_area_km2: 10.0, coverage_fraction: 0.4, is_analysis_ready: true}

  - name: test_std_robust_z_requires_seven_prior_samples
    model: int_tempo_no2_std_region_anomalies
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('tempo_no2_std_contract')
        rows:
          - {contract_key: default, contract_version: 0.4.0, anomaly_baseline_days: 28, anomaly_min_baseline_samples: 7}
      - input: ref('int_tempo_no2_std_region_hourly')
        rows:
          - {canonical_region_id: US-CA-037, observation_hour: "2026-03-01 21:00:00", timezone: America/Los_Angeles, local_observation_hour: "2026-03-01 13:00:00", no2_mean: 1.0, is_analysis_ready: true, revision: 1}
    expect:
      rows:
        - {canonical_region_id: US-CA-037, observation_hour: "2026-03-01 21:00:00", baseline_sample_count: 0, baseline_median: null, baseline_mad: null, robust_z_score: null}

  - name: test_std_local_hour_conversion_across_dst
    model: int_tempo_no2_std_region_hourly
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('tempo_no2_std_contract')
        rows:
          - {contract_key: default, contract_version: 0.4.0, min_region_coverage: 0.25, stale_hours_warn: 24, stale_hours_error: 48, anomaly_baseline_days: 28, anomaly_min_baseline_samples: 7, accepted_quality_flags: "0|1"}
      - input: ref('stg_tempo_no2_std_region_registry')
        rows:
          - {canonical_region_id: US-CA-037, timezone: America/Los_Angeles}
      - input: ref('stg_tempo_no2_std_region_hour_aggregates')
        rows:
          - {canonical_region_id: US-CA-037, country_code: US, region_type: county, observation_hour: "2026-03-01 21:00:00", no2_mean: 1.0, no2_median: 1.0, no2_p90: 1.0, valid_pixel_count: 1, total_pixel_count: 1, valid_area_km2: 1.0, total_area_km2: 1.0, coverage_fraction: 1.0, quality_flag_accepted: true, source_granule_count: 1, all_granules_validated: true, revision: 1, geometry_version: test-v1, ingested_at: "2026-03-01 21:05:00"}
    expect:
      rows:
        - {observation_hour: "2026-03-01 21:00:00", timezone: America/Los_Angeles, local_observation_hour: "2026-03-01 13:00:00"}
