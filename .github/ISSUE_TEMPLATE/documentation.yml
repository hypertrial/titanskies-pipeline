name: Documentation issue
description: Report stale, missing, or unclear TitanSkies documentation.
title: "docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach credentials, live/raw TEMPO files, generated geography, or local DuckDB databases.
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: docs/guides/query-the-warehouse.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is stale, missing, confusing, or hard to follow?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested fix
  - type: dropdown
    id: audience
    attributes:
      label: Affected audience
      options:
        - Analyst
        - Local operator
        - Contributor
        - Maintainer
    validations:
      required: true
